name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: gofmt
        run: test -z "$(gofmt -l . | grep -v '^data/')" || { gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      # Live tests are gated behind SMOKE_LIVE and skip automatically in CI.
      - name: test (race)
        run: go test ./... -race -count=1
      - name: layering guard
        run: bash scripts/layering-check.sh
