# 营销域:vector 知识库(RAG = tools 层的一种工具)+ 两个 sub-agent
# (agentic RAG / 调用级 todo 的研究型长循环)。

sources:
  - name: kb
    type: vector
    config:
      description: 售后政策知识库(退货/物流/会员权益)
      tool_name: search_kb
      top_k: 2
      docs:
        - "退货政策:自签收起7天内无理由退货,商品需保持完好。"
        - "物流政策:偏远地区加收运费,一般地区满99包邮。"
        - "会员权益:黑卡会员全场免运费,享专属客服。"

subagents:
  # agentic RAG:sub-agent 内部查知识库后作答
  - name: faq_bot
    description: 售后政策问答(退货/物流/会员权益)
    params: {q: {type: string, required: true}}
    prompt: "[FAQ]你是售后FAQ助手。用户问题:{q}。查知识库后作答。"
    tools:
      - "tools/kb/search_kb"
    loop: {max_rounds: 3}

  # 调用级 todo:研究型长循环的例外通道
  - name: deep_research
    description: 深入研究一个营销课题(耗时较长)
    todo: true
    loop: {max_rounds: 8}
    params: {topic: {type: string, required: true}}
    prompt: "深入研究课题:{topic}。先用 todo_write 列出研究计划,逐项推进并更新状态,最后给出研究结论。"
