# 营销域:reflection / router / plan-execute / 调用级 todo / 跨 ns skill 引用。

components:
  # reflection:文案执行者产稿 → 评审者挑错 → 修订,轮次代码钉死
  - name: campaign_writer
    engine: reflection
    engine_config:
      max_rounds: 3
      executor_prompt: "你是文案执行者。为活动写一段推广文案;收到评审意见时逐条修正,输出完整新稿。"
    prompt: "为活动「{brief}」撰写推广文案。"

  # router 的两个下游:无工具 direct,单次作答
  - name: faq_bot
    engine: direct
    prompt: "[FAQ]你是售后FAQ助手,直接回答:{q}"
  - name: human_handoff
    engine: direct
    prompt: "[HANDOFF]生成一段转人工的引导话术,问题:{q}"

  # router:一次分诊调用,路由到工具面上的能力
  - name: channel_router
    engine: router
    engine_config: {fallback: human_handoff}
    prompt: "为用户来询选择处理通道:{q}"
    tools:
      - "components/faq_bot"
      - "components/human_handoff"

  # plan-execute:活动策划——拆解 → 逐步执行 → 复盘;
  # 工具面含跨 ns 的 catalog skill(跨命名空间的唯一合法引用形态)
  - name: campaign_planner
    engine: plan-execute
    engine_config: {max_rounds: 2, step_max_steps: 4, on_exhausted: summarize}
    prompt: "策划一场关于「{topic}」的促销活动,需要时审查相关商品定价。"
    tools:
      - "cap://skill.graph/catalog/price-review"

  # react + 调用级 todo:研究型长循环的例外通道
  - name: deep_research
    engine: react
    todo: true
    max_steps: 8
    prompt: "深入研究课题:{topic}。先用 todo_write 列出研究计划,逐项推进并更新状态,最后给出研究结论。"

skills:
  - name: route-inquiry
    description: 把用户来询分诊到合适的处理通道
    params:
      q: {type: string, desc: 用户来询原文, required: true}
    steps:
      - {name: route, use: "components/channel_router", args: '{"q":"{q}"}'}

  - name: launch-campaign
    description: 策划并产出一场促销活动的完整文案
    params:
      topic: {type: string, desc: 活动主题, required: true}
    steps:
      - {name: plan,  use: "components/campaign_planner", args: '{"topic":"{topic}"}'}
      - {name: copy,  use: "components/campaign_writer",  args: '{"brief":"{plan}"}'}
    output: copy

  - name: deep-research
    description: 深入研究一个营销课题(耗时较长)
    params:
      topic: {type: string, desc: 研究课题, required: true}
    steps:
      - {name: r, use: "components/deep_research", args: '{"topic":"{topic}"}'}
