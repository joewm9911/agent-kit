# 商品域:工具(HTTP mock)+ 过程卡 + sub-agent。
# 覆盖:过程卡(工具直挂 + 指引渲染)、sub-agent(fork/digest/compaction
# 目标)、mutating 工具的风险与审批。

sources:
  - name: shop
    type: http
    config:
      timeout_sec: 20
      tools:
        - name: search_products
          description: 按关键词搜索商品,返回商品列表 JSON
          method: GET
          url: "${SMOKE_API_BASE}/products"
          params:
            q: {type: string, desc: 搜索关键词, required: true, in: query}
        - name: get_product
          description: 按商品 ID 查询商品详情
          method: GET
          url: "${SMOKE_API_BASE}/products/{id}"
          params:
            id: {type: string, desc: 商品 ID, required: true, in: path}
        - name: get_inventory
          description: 查询商品库存明细(数据量可能很大)
          method: GET
          url: "${SMOKE_API_BASE}/inventory/{sku}"
          params:
            sku: {type: string, desc: 商品 SKU, required: true, in: path}
        - name: update_price
          description: 更新商品价格(改动性操作)
          method: POST
          url: "${SMOKE_API_BASE}/price"
          risk: mutating
          params:
            sku:   {type: string, desc: 商品 SKU, required: true, in: body}
            price: {type: string, desc: 新价格, required: true, in: body}

skills:
  # 过程卡:主循环照指引亲自执行,声明的工具直挂宿主工具面
  - name: quick-product-qa
    description: 快速商品问答
    tools: ["tools/shop/search_products"]
    prompt: "回答用户的商品问题:用 search_products 查数据后作答,报具体数字。问题:{$input}"

  - name: price-review
    description: 审查指定商品的定价(按步骤拉详情、看库存、给结论)
    params:
      sku:      {type: string, desc: 商品 SKU, required: true}
      question: {type: string, desc: 用户关注点}
    tools:
      - "tools/shop/get_product"
      - "tools/shop/get_inventory"
    prompt: |
      按步骤审查 {sku} 的定价(关注:{question}):
      1. 用 get_product 查询商品详情(价格与成本);
      2. 用 get_inventory 查看库存明细;
      3. 综合给出定价结论。

  # 过程卡包装 mutating 工具:卡片只是指引(readonly),审批闸在工具上
  - name: apply-price
    description: 应用新的商品价格(改动性操作,update_price 受审批策略约束)
    params:
      sku:   {type: string, desc: 商品 SKU, required: true}
      price: {type: string, desc: 新价格, required: true}
    tools:
      - "tools/shop/update_price"
    prompt: "用 update_price 把 {sku} 的价格调整为 {price},完成后汇报结果。"

subagents:
  # sub-agent:隔离子循环——digest 大结果消化 + 内部压缩,fork 的接收方
  - name: price_analyst
    description: 深度定价分析(中间数据大,隔离执行;继承对话背景)
    context: fork
    loop: {max_rounds: 6, compaction: {max_messages: 20, keep_recent: 8}}
    digest: {over: 3000}
    params:
      sku: {type: string, required: true}
      question: {type: string}
    prompt: "你是价格分析师。分析商品 {sku} 的定价(用户关注:{question})。先调用 get_product 查询商品详情,必要时调用 get_inventory 看库存,然后给出定价结论。"
    tools:
      - "tools/shop/get_product"
      - "tools/shop/get_inventory"
