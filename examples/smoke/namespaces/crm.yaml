# 客户域:最小形态的能力域——一个工具 + 一个带 fork 的 sub-agent。
# 同时充当"多 agent 共享 namespace"的验证对象(两个 agent 都挂载它,
# 源连接按文件缓存共享,只 Sync 一次)。

sources:
  - name: cdp
    type: http
    config:
      tools:
        - name: get_customer
          description: 查询客户画像
          method: GET
          url: "${SMOKE_API_BASE}/customers/{id}"
          params:
            id: {type: string, desc: 客户 ID, required: true, in: path}

subagents:
  - name: crm_analyst
    description: 生成客户跟进简报(分析师继承当前对话背景)
    context: fork
    loop: {max_rounds: 4}
    params: {id: {type: string, desc: 客户 ID, required: true}}
    prompt: "你是客户分析师。先用 get_customer 查询客户 {id} 的画像,再结合当前对话背景给出跟进建议。"
    tools:
      - "tools/cdp/get_customer"
