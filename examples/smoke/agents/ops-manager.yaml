# 运营主管:挂满三个能力域,治理与记忆全开——冒烟主对象。

description: 电商运营主管助手,负责定价审查、活动策划、客户跟进
system_prompt: "[OPS]你是电商运营主管的助手。定价问题用 price-review,调价用 apply-price,活动用 launch-campaign,客户问题用 customer-brief。多步骤任务先列计划。"
max_steps: 20

namespaces:
  - ../namespaces/catalog.yaml
  - ../namespaces/marketing.yaml
  - ../namespaces/crm.yaml

# 执行参数默认(override 链的 agent 层)
defaults:
  step_retry: 1

# 具名存储实例:四类内部状态各一个实例,模块块的 store 槽用
# cap://store/<kind>/<name> 引用。分布式部署把 type 换成 redis
# (config: {addr: ...})即可,键按 agent/会话隔离,多副本共享同一后端不
# 碰撞;此处用 file/inmemory 保持冒烟离线可跑。
#   kind=session → 会话短期记忆   kind=memory → 长期记忆(向量库换 qdrant)
#   kind=todo    → 计划清单        kind=result → digest 大结果暂存
stores:
  - {name: sessions, kind: session, type: file, config: {dir: "${SMOKE_DATA_DIR}/ops-sessions"}}
  - {name: ltm,      kind: memory,  type: inmemory}   # 分布式向量后端换 type: qdrant
  - {name: plans,    kind: todo,    type: inmemory}
  - {name: cache,    kind: result,  type: inmemory}

# ---- 四大模块各自独立,store 槽引用上面的具名实例 ----
session:                                     # ① 会话短期记忆
  store: cap://store/session/sessions        #    会话历史后端
  window: 40
  record_tools: summary
  recall: {top_k: 3}                         #    窗外会话召回
  compaction: {max_messages: 12, keep_recent: 4}  # 上下文压缩

memory:                                      # ② 长期记忆
  store: cap://store/memory/ltm              #    memory_save/search 后端
  tools: true                                #    挂 memory_save/search 工具
  recall: {top_k: 3}                         #    长期记忆召回

todo:                                        # ③ 计划清单
  store: cap://store/todo/plans              #    todo_write/read 后端

digest:                                      # ④ 大结果消化 / 暂存
  over: 4000
  store: cap://store/result/cache            #    read_result 后端

budget: {max_model_calls: 60, max_tokens: 400000}
max_tool_result_len: 8000

approval: interactive
approval_policy:
  remember: true
  rules:
    # 灰度 SKU 免批;其余调价照常审批(参数级规则)
    - {ref: "cap://skill/catalog/apply-price", args: {sku: "CANARY-*"}, action: allow}
