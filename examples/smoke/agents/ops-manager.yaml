# 运营主管:挂满三个能力域,治理与记忆全开——冒烟主对象。

description: 电商运营主管助手,负责定价审查、活动策划、客户跟进
system_prompt: "[OPS]你是电商运营主管的助手。定价问题用 price-review,调价用 apply-price,活动用 launch-campaign,客户问题用 customer-brief。多步骤任务先列计划。"
max_steps: 20

namespaces:
  - ../namespaces/catalog.yaml
  - ../namespaces/marketing.yaml
  - ../namespaces/crm.yaml

# 执行参数默认(override 链的 agent 层)
defaults:
  step_retry: 1

memory:
  window: 40
  store: file
  store_config: {dir: "${SMOKE_DATA_DIR}/ops-sessions"}
  long_term_tools: true
  auto_recall: {top_k: 3}
  record_tools: summary

budget: {max_model_calls: 60, max_tokens: 400000}
compaction: {max_messages: 12, keep_recent: 4}
max_tool_result_len: 8000
context_hygiene: {digest_over: 4000}

approval: interactive
approval_policy:
  remember: true
  rules:
    # 灰度 SKU 免批;其余调价照常审批(参数级规则)
    - {ref: "cap://skill/catalog/apply-price", args: {sku: "CANARY-*"}, action: allow}
