# app.yaml —— 应用级入口(部署拥有):进程级资源 + 接线板,业务含量为零。
# 三层文件:app(装配成什么进程)→ agents/(对外是什么产品)→ namespaces/(有什么能力)。
# 运行:MINIMAX_API_KEY=... go run . (见 main.go)

# ---- 凭证:${VAR} 走环境变量,${secret:VAR} 走 provider,对全部文件生效 ----
secrets:
  provider: env

# ---- 提示词供给:本地目录,可换 http 型对接提示词平台 ----
prompts:                          # 提示词供给:源 + 默认版本标签
  sources:
    - name: pp
      type: file
      config: {dir: ./prompts}
  default_label: production

# ---- 全局兼容源:直挂 agent 工具面的通用工具(业务工具请进 namespace)----
sources:
  - name: fs
    type: mcp
    required: false
    config:
      transport: stdio
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
      risk: mutating
      risk_overrides: {read_file: readonly, list_directory: readonly}

# ---- 目录准入:dangerous 能力默认拒之门外 ----
catalog:
  max_risk: mutating

# ---- 执行画像基线(app 层):所有 agent/component 的降级源(就近者胜)----
# reliability(Ring 0,零值即默认):模型瞬时错误重试 + 工具超时。
reliability:
  retry: {max_attempts: 3, base_delay: 500ms}
  tool_timeout: 5m

# model:五级降级链的最终回落(mount→component→ns→agent→app)。
model:
  provider: minimax          # 或 openai(兼容所有 OpenAI 协议网关)
  config:
    api_key: "${MINIMAX_API_KEY}"

# ---- 接线板:装配哪些 agent(路径相对本文件;文件名即 agent 名)----
agents:
  - agents/assistant.yaml

