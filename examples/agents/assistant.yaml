# agents/assistant.yaml —— agent 维度配置(产品面拥有)。
# 文件名即 agent 名;agent 粒度的配置全部收在这里。
# 治理策略(approval/budget)是 agent 独占的安全边界,不被 namespace 覆盖。

description: 会查天气、能写竞品报告、可以记住用户偏好的助手
system_prompt: {ref: "cap://prompt/pp/assistant-persona"}   # L2,L1 用内置规约
max_steps: 30

# ---- 能力域关联:挂载 namespace 即获得其全部导出 skill(路径相对本文件)----
namespaces:
  - ../namespaces/briefing.yaml
  - ../namespaces/research.yaml

# ---- 兼容路径:全局源的通用工具直挂;exclude 对自动挂载同样生效 ----
capabilities:
  include:
    - "cap://tool/fs/*"
  exclude:
    - "cap://tool/fs/write_file"

# ---- 执行参数默认值(override 链的 agent 层,可被 ns/component 就近覆盖)----
# defaults:
#   model: {provider: openai, config: {model: gpt-4o, api_key: "${OPENAI_API_KEY}"}}
#   step_retry: 1

# ---- 四大上下文/记忆模块,各自独立;store 槽引用 stores: 具名实例或裸 type ----
session:                  # ① 会话短期记忆
  window: 100             # 会话记忆(运行时织入,模型无感知);store 层硬裁剪
  store: file             # 裸 type 缺省简写:inmemory | file | 或 cap://store/session/<name>
  store_config: {dir: ./data/sessions}   # 运行时路径,相对进程工作目录
  record_tools: summary   # 工具轨迹随会话持久化:summary | full | off
  recall: {top_k: 3}      # 窗外会话召回(retriever 缺省 bigram,可注册替换)
  # 压缩:阈值触发(token 维度优先用供应商真实用量校准);摘要内容策略可配
  # (prompt 支持字面量或 {ref:});要求 window >= keep_recent+2(装配期校验)
  compaction: {max_messages: 30, max_tokens: 60000, keep_recent: 10}
  #   prompt: {ref: "cap://prompt/pp/ops-summarize"}   # 领域保留清单

memory:                   # ② 长期记忆(独立模块;向量后端换 store: cap://store/memory/<name>)
  tools: true             # 挂 memory_save / memory_search(大脑自主)
  recall: {top_k: 3}      # 长期记忆召回(策略由 KV 后端决定)
  # 作用域(多用户隔离):默认写用户桶、读用户桶+共享池;用户身份由 serving
  # 的 {user} / 飞书 open_id 提供,缺身份时用户记忆写入 fail fast。
  # scope: {write: user, read: [user, shared]}
  # seed:                 # 装配期灌入共享池(域共享知识的运维写入口)
  #   - {key: "发布流程", value: "灰度→观察24h→全量"}

digest:                   # ③ 大结果消化/暂存:超阈值消化,全文落暂存供 read_result 取回
  over: 4000
  # store: cap://store/result/<name>   # 分布式下指向 redis

budget: {max_model_calls: 40, max_tokens: 200000}
max_tool_result_len: 8000

approval: interactive     # mutating 操作需人工批准(CLI y/n/a/x 或 IM 回复)
# 参数级审批策略:首条命中生效,无命中回落 ask;remember 启用会话级决策记忆
# approval_policy:
#   remember: true
#   rules:
#     - {ref: "cap://tool/fs/write_file", args: {path: "/tmp/*"}, action: allow}
