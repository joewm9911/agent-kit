# 运营主管:挂满三个能力域,治理与记忆全开——冒烟主对象。

description: 电商运营主管助手,负责定价审查、销售分析、订单处理、活动策划、客户跟进
prompt:
  system: |
    [OPS] 你是电商运营主管的助手,管理 20 个商品(6 品类:音频/键鼠外设/显示器/存储/网络设备/智能家居)、3 个仓库(仓A/仓B/仓C)、订单与客户。你对业务数据没有记忆——一切事实以工具查询结果为准。

    # 能力路由(按任务类型选,查询绝不用改动性能力)
    - 查询(只读):商品搜索与问答 quick-product-qa;库存明细 check-inventory;订单查询与诊断 order-inquiry;客户画像 customer-brief
    - 分析(只读):销售报表 sales-report;单品趋势 product-trend;滞销/下滑扫描 slow-movers;定价审查 price-review;批量盘点 bulk-audit
    - 改动(先核实、后执行、说明对象与理由):调价 apply-price;补货 restock;上下架 set-product-status;订单发货 ship-order;退款 process-refund
    - 其他:活动策划 launch-campaign;PDF 读写用 pdf 技能(传文件绝对路径);临时计算写 python 脚本交给 python 工具(用 print 输出结果)

    # 工作规则
    1. 问题含多个子问题、或需要 3 步以上:先用 todo_write 拆成计划,每完成一项立即标 completed 再做下一项。计划里的每一项都必须有对应的真实工具调用——写在正文里的"执行步骤"不会被执行,写完计划必须立刻开始调工具。
    2. 回答中的每个数字、清单、结论都必须来自本对话的工具结果;没查过的现在就查;用户要求"重新分析"时必须重新调用工具取数,不得凭上文复述或推断。
    3. 各域数据用各域工具:销量与趋势只看 sales 系能力,库存只看 check-inventory,订单只看 order-inquiry——不要拿订单数据推断销量或库存,也不要采信其他能力顺带给出的跨域结论。
    4. 工具口径覆盖不了问题口径时(例如时间范围过滤不了),如实告知口径差异并给出实际口径下的数据,不得把近似数据当精确答案。
    5. 改动性操作执行前,先用对应的只读能力核实现状,再说明操作对象与理由;用户未确认的批量改动不要自作主张。
# 执行画像 A 类(agent 自己这一层,兼作其 component 的降级源):
loop:
  max_steps: 20
  # tool_clear:保护窗外超长工具结果先替换为占位(零模型调用),压缩兜底
  compaction: {max_messages: 40, keep_recent: 10, tool_clear_over: 800, tool_clear_keep: 12}
step_defaults:
  retry: 1

namespaces:
  - ../namespaces/catalog.yaml
  - ../namespaces/sales.yaml
  - ../namespaces/marketing.yaml
  - ../namespaces/crm.yaml
  - ../namespaces/orders.yaml   # 在 crm 之后:order_auditor 跨 ns 引用 customer-brief
  - ../namespaces/docs.yaml

# 全局源选品:app.yaml sources 里的 calc(python 脚本执行)直挂本 agent
# 工具面。跑在哪由 app 级 exec: 块决定(default_sandbox),此处只做选品。
capabilities:
  include: ["cap://tool/calc/*"]

# 具名存储实例:四类内部状态各一个实例,模块块的 store 槽用
# cap://store/<kind>/<name> 引用。分布式部署把 type 换成 redis
# (config: {addr: ...})即可,键按 agent/会话隔离,多副本共享同一后端不
# 碰撞;此处用 file/inmemory 保持冒烟离线可跑。
#   kind=session → 会话短期记忆   kind=memory → 长期记忆(向量库换 qdrant)
#   kind=todo    → 计划清单        kind=result → digest 大结果暂存
# sessions/plans 的 type 由 runner 检测注入:本机 redis 可达 → redis
# (分布式形态,跨进程/多副本共享),否则 file/file(离线可跑)。
# 混合 config 是刻意的:file 只读 dir,redis 只读 addr/prefix,互不干扰。
stores:
  - {name: sessions, kind: session, type: "${OPS_SESSION_STORE}",
     config: {dir: "${OPS_DATA_DIR}/ops-sessions", addr: "${OPS_REDIS_ADDR}", prefix: "ops:"}}
  - {name: ltm,      kind: memory,  type: inmemory}   # 分布式向量后端换 type: qdrant
  - {name: plans,    kind: todo,    type: "${OPS_TODO_STORE}",
     config: {dir: "${OPS_DATA_DIR}/ops-plans", addr: "${OPS_REDIS_ADDR}", prefix: "ops:"}}
  - {name: cache,    kind: result,  type: inmemory}

# ---- 四大模块各自独立,store 槽引用上面的具名实例 ----
session:                                     # ① 会话短期记忆
  store: cap://store/session/sessions        #    会话历史后端
  window: 40
  record_tools: summary
  recall: {top_k: 3}                         #    窗外会话召回(压缩见 loop.compaction)

memory:                                      # ② 长期记忆
  store: cap://store/memory/ltm              #    memory_save/search 后端
  tools: true                                #    挂 memory_save/search 工具
  recall: {top_k: 3}                         #    长期记忆召回

todo:                                        # ③ 计划清单
  store: cap://store/todo/plans              #    todo_write/read 后端

digest:                                      # ④ 大工具结果处理:消化 + 硬截断
  over: 4000                                 #    超阈值 → 消化
  truncate: 8000                             #    硬截断兜底(原 max_tool_result_len)
  store: cap://store/result/cache            #    read_result 后端

budget: {max_model_calls: 200, max_tokens: 2000000}  # 交互会话放宽

approval:                     # 治理:审批模式 + 参数级策略(合一)
  mode: interactive
  remember: true
  rules:
    # 灰度 SKU 免批;其余调价照常审批(参数级规则)
    - {ref: "cap://skill/catalog/apply-price", args: {sku: "CANARY-*"}, action: allow}
