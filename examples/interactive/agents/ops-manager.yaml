# 运营主管:挂满三个能力域,治理与记忆全开——冒烟主对象。

description: 电商运营主管助手,负责定价审查、销售分析、订单处理、活动策划、客户跟进
prompt:
  system: |
    [OPS]
    <role>
    你是电商运营中台的智能助手,服务运营主管。业务范围覆盖 20 个商品
    (6 品类:音频 / 键鼠外设 / 显示器 / 存储 / 网络设备 / 智能家居)、3 个仓库
    (仓A / 仓B / 仓C),以及订单与客户。你不持有任何业务数据的记忆:一切结论
    以本轮工具查询结果为准,过往对话中的数字不作为当前判断的依据。
    定位是严谨的运营分析师——先取证、再推理、后建议,不臆断、不夸大。
    </role>

    <capability_routing>
    按任务性质选择能力;查询类任务严禁调用任何改动性能力。
    - 只读查询:商品搜索与问答 quick-product-qa;库存明细 check-inventory;
      订单查询与诊断 order-inquiry(隔离执行);客户画像 customer-brief;售后政策 faq
    - 只读分析:销售报表 sales-report(隔离执行,报表经交付物通道原文直达);
      单品趋势 product-trend;滞销与下滑扫描 slow-movers;定价审查 price-review;
      深度定价分析 price_analyst;批量盘点 bulk-audit;开放式销售分析 sales_analyst
    - 改动操作(先核实现状、再执行、并明确对象与理由):调价 apply-price;
      补货 restock;上下架 set-product-status;订单发货 ship-order;退款 process-refund
    - 通用:活动策划 launch-campaign;PDF 处理用 pdf 技能(传入文件绝对路径);
      临时计算写 python 脚本交由 python 工具执行(以 print 输出结果)
    </capability_routing>

    <operating_discipline>
    1. 证据优先:回答中的每个数字、清单与结论都必须源自本轮工具结果。未经
       查询的一律先查;用户要求"重新分析"时必须重新取数,不得凭上文复述或推断。
    2. 计划先行:任务含多个子问题、或需 3 步以上时,先用 todo_write 拆解为计划,
       逐项推进并即时标记完成。计划中的每一项都须落地为真实工具调用——写在
       正文里的"步骤"不会被执行;计划一旦列出,立即开始调用工具。
    3. 领域隔离:各域数据只用各域工具——销量趋势看 sales 系,库存看
       check-inventory,订单看 order-inquiry。不以订单数据推断销量或库存,不采信
       其他能力顺带给出的跨域结论。
    4. 口径诚实:当工具口径无法精确匹配问题口径(如无法按时间范围过滤)时,
       如实说明差异并给出实际口径下的数据,绝不将近似值当作精确答案。
    5. 改动审慎:执行任何改动前,先用对应只读能力核实现状,再明确说明操作
       对象与理由;用户未确认的批量改动不得自作主张。
    </operating_discipline>
# 执行画像 A 类(agent 自己这一层,兼作其 subagent 的降级源):
loop:
  max_rounds: 20
  # tool_clear:保护窗外超长工具结果先替换为占位(零模型调用),压缩兜底
  compaction: {max_messages: 40, keep_recent: 10, tool_clear_over: 800, tool_clear_keep: 12}

namespaces:
  - ../namespaces/catalog.yaml
  - ../namespaces/sales.yaml
  - ../namespaces/marketing.yaml
  - ../namespaces/crm.yaml
  - ../namespaces/orders.yaml
  - ../namespaces/docs.yaml

# 全局源选品:app.yaml sources 里的 calc(python 脚本执行)直挂本 agent
# 工具面。跑在哪由 app 级 exec: 块决定(default_sandbox),此处只做选品。
capabilities:
  include: ["cap://tool/calc/*"]

# 具名存储实例:四类内部状态各一个实例,模块块的 store 槽用
# cap://store/<kind>/<name> 引用。分布式部署把 type 换成 redis
# (config: {addr: ...})即可,键按 agent/会话隔离,多副本共享同一后端不
# 碰撞;此处用 file/inmemory 保持冒烟离线可跑。
#   kind=session → 会话短期记忆   kind=memory → 长期记忆(向量库换 qdrant)
#   kind=todo    → 计划清单        kind=result → digest 大结果暂存
# sessions/plans 的 type 由 runner 检测注入:本机 redis 可达 → redis
# (分布式形态,跨进程/多副本共享),否则 file/file(离线可跑)。
# 混合 config 是刻意的:file 只读 dir,redis 只读 addr/prefix,互不干扰。
stores:
  - {name: sessions, kind: session, type: "${OPS_SESSION_STORE}",
     config: {dir: "${OPS_DATA_DIR}/ops-sessions", addr: "${OPS_REDIS_ADDR}", prefix: "ops:"}}
  - {name: ltm,      kind: memory,  type: inmemory}   # 分布式向量后端换 type: qdrant
  - {name: plans,    kind: todo,    type: "${OPS_TODO_STORE}",
     config: {dir: "${OPS_DATA_DIR}/ops-plans", addr: "${OPS_REDIS_ADDR}", prefix: "ops:"}}
  - {name: cache,    kind: result,  type: "${OPS_RESULT_STORE}", ttl: 1h,
     config: {dir: "${OPS_DATA_DIR}/ops-results", addr: "${OPS_REDIS_ADDR}", prefix: "ops:"}}

# ---- 四大模块各自独立,store 槽引用上面的具名实例 ----
session:                                     # ① 会话短期记忆
  store: cap://store/session/sessions        #    会话历史后端
  window: 40
  record_tools: summary
  recall: {top_k: 3}                         #    窗外会话召回(压缩见 loop.compaction)

memory:                                      # ② 长期记忆
  store: cap://store/memory/ltm              #    memory_save/search 后端
  expose_tools: true                         #    挂 memory_save/search 工具
  recall: {top_k: 3}                         #    长期记忆召回

todo:                                        # ③ 计划清单
  store: cap://store/todo/plans              #    todo_write/read 后端

digest:                                      # ④ 大工具结果处理:消化 + 硬截断
  over: 4000                                 #    超阈值 → 消化
  truncate: 8000                             #    硬截断兜底(原 max_tool_result_len)
  store: cap://store/result/cache            #    read_result 后端

budget: {max_model_calls: 200, max_tokens: 2000000}  # 交互会话放宽

# 动态委派:模型可把独立子任务(并行线索/大中间数据)委派给隔离子循环
# (builtin delegate;深度 1,预算审批与本 agent 共账)。
delegate: {enabled: true, max_rounds: 8, max_parallel: 4}

approval:                     # 治理:审批模式 + 参数级策略(合一)
  mode: interactive
  remember: true
  rules:
    # 灰度 SKU 免批;其余调价照常审批(参数级规则;审批闸在 mutating 工具上)
    - {ref: "cap://tool/shop/update_price", args: {sku: "CANARY-*"}, action: allow}
