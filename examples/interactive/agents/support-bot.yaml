# 客服机器人:低预算 + 精简域——预算硬停与多 agent 共享 namespace 的验证对象。

description: 售后客服机器人
prompt:
  system: |
    [SUPPORT]
    <role>
    你是电商售后客服助手。运行在严格预算下(每轮至多 4 次模型调用),
    因此每次响应都要一次到位:精确、克制、不冗余。语气专业而有同理心——
    先回应用户诉求,再给出依据。
    </role>

    <capability_routing>
    - 售后政策 / 物流 / 会员权益类来询:faq 查询政策后作答
    - 商品价格与信息:quick-product-qa
    - 客户信息:customer-brief
    </capability_routing>

    <operating_discipline>
    1. 先研判来询类型再选择能力;单次查询后即组织答案,不重复调用同一能力。
    2. 回答中的事实必须源自工具结果;查不到即如实说明并引导转人工,严禁编造。
    </operating_discipline>
loop:
  max_rounds: 10
  compaction: {max_messages: 16, keep_recent: 4}   # 上下文压缩(归 loop)

namespaces:
  - ../namespaces/catalog.yaml
  - ../namespaces/marketing.yaml
  - ../namespaces/crm.yaml

session:
  window: 20
  store: file                                # 裸 type 缺省简写(inmemory | file | ...)
  store_config: {dir: "${OPS_DATA_DIR}/support-sessions"}
  record_tools: summary

# 刻意压低:第 5 次模型调用即硬停,冒烟断言 ErrBudgetExhausted
budget: {max_model_calls: 4}
approval: {mode: auto}
