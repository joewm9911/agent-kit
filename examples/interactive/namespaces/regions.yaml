# regions —— 统一输入模型的活文档(P1–P4 的组件测试样例):
#   - input: 组件级输入隔离——scan-regions 图并行扇出到同一个 region_report,
#     每个分支用 input: 重设该组件的 {$input}(华东/华南/华北,互不串扰);
#   - {$user_input} 穿透——loop 原始诉求穿透所有嵌套恒定不变,三个分支都看得到;
#   - params 占位符——{category} 经 args 传入、填 prompt 占位符(P4 校验)。
components:
  - name: region_report            # 无工具 react = 单次模型调用
    engine: react
    params:
      category: {type: string, required: true}
    prompt: "[SCAN] 区域分析师。整体诉求「{$user_input}」;本次区域「{$input}」、品类「{category}」。给出该区域结论。"

skills:
  - name: scan-regions
    description: 多区域并行盘点(演示组件级输入隔离 + 原始诉求穿透)
    engine: graph
    params:
      category: {type: string, desc: 品类, required: true}
    steps:
      - {name: east,  use: "components/region_report", input: "华东", args: '{"category":"{category}"}', needs: []}
      - {name: south, use: "components/region_report", input: "华南", args: '{"category":"{category}"}', needs: []}
      - {name: north, use: "components/region_report", input: "华北", args: '{"category":"{category}"}', needs: []}
      - {name: merge, use: model, needs: [east, south, north],
         prompt: "汇总三区域结论:华东[{east}] 华南[{south}] 华北[{north}]。"}
    output: merge
