# 营销域:vector 知识库(RAG = tools 层的一种工具)+ 过程卡 + sub-agent
# (agentic RAG / 调用级 todo 的研究型长循环)。

sources:
  - name: kb
    type: vector
    config:
      description: 售后政策知识库(退货/物流/会员权益)
      tool_name: search_kb
      top_k: 2
      docs:
        - "退货政策:自签收起7天内无理由退货,商品需保持完好。"
        - "物流政策:偏远地区加收运费,一般地区满99包邮。"
        - "会员权益:黑卡会员全场免运费,享专属客服。"

skills:
  # 过程卡:售后政策问答,主循环查知识库后作答
  - name: faq
    description: 售后政策问答(退货/物流/会员权益)
    tools: ["tools/kb/search_kb"]
    prompt: "用 search_kb 检索售后政策知识库,依据检索结果回答用户问题:{$input}。知识库没有的不要编造。"

  # 过程卡:活动策划——主循环自己拆解、必要时用已挂载的能力查数据
  - name: launch-campaign
    description: 策划并产出一场促销活动的完整文案
    params:
      topic: {type: string, desc: 活动主题, required: true}
    prompt: |
      为「{topic}」策划促销活动并产出完整文案:
      1. 明确目标人群与主打商品(需要商品/销量数据时用已有工具查);
      2. 拟定活动机制(折扣/满减/赠品,一条主机制即可);
      3. 产出推广文案终稿:标题 + 正文(150 字内)+ 行动号召;
      4. 自查一遍文案是否与机制一致,修正后输出。

subagents:
  # 调用级 todo:研究型长循环的例外通道
  - name: deep_research
    description: 深入研究一个营销课题(耗时较长)
    todo: true
    loop: {max_rounds: 8}
    params: {topic: {type: string, required: true}}
    prompt: "深入研究课题:{topic}。先用 todo_write 列出研究计划,逐项推进并更新状态,最后给出研究结论。"
