# 商品域:工具(HTTP mock)+ 过程卡 + sub-agent。
# 覆盖:过程卡(工具直挂、主循环亲自执行;A/B 实测质量持平子循环、
# 模型调用 -25%)、sub-agent(fork/digest/compaction)、mutating 工具
# 的风险与审批。

sources:
  - name: shop
    type: http
    config:
      timeout_sec: 20
      tools:
        - name: search_products
          description: 搜索商品,支持关键词/品类/状态过滤,返回商品列表 JSON(含价格与成本)
          method: GET
          url: "${OPS_API_BASE}/products"
          params:
            q:        {type: string, desc: 关键词(名称/品类/ID 模糊匹配,可空=全部), in: query}
            category: {type: string, desc: "品类(音频|键鼠外设|显示器|存储|网络设备|智能家居)", in: query}
            status:   {type: string, desc: "状态(在售|下架|预售)", in: query}
        - name: get_product
          description: 按商品 ID 查询商品详情
          method: GET
          url: "${OPS_API_BASE}/products/{id}"
          params:
            id: {type: string, desc: 商品 ID, required: true, in: path}
        - name: get_inventory
          description: 查询商品库存明细(数据量可能很大)
          method: GET
          url: "${OPS_API_BASE}/inventory/{sku}"
          params:
            sku: {type: string, desc: 商品 SKU, required: true, in: path}
        - name: update_price
          description: 更新商品价格(改动性操作)
          method: POST
          url: "${OPS_API_BASE}/price"
          risk: mutating
          params:
            sku:   {type: string, desc: 商品 SKU, required: true, in: body}
            price: {type: string, desc: 新价格, required: true, in: body}
        - name: set_product_status
          description: 商品上下架(改动性操作;status 取 在售|下架|预售)
          method: POST
          url: "${OPS_API_BASE}/products/status"
          risk: mutating
          params:
            sku:    {type: string, desc: 商品 SKU, required: true, in: body}
            status: {type: string, desc: 目标状态, required: true, in: body}
        - name: adjust_stock
          description: 调整某仓库的可用库存(改动性操作;delta 为增减数量,负数=扣减)
          method: POST
          url: "${OPS_API_BASE}/stock"
          risk: mutating
          params:
            sku:       {type: string, desc: 商品 SKU, required: true, in: body}
            warehouse: {type: string, desc: "仓库(仓A|仓B|仓C)", required: true, in: body}
            delta:     {type: number, desc: 增减数量, required: true, in: body}

skills:
  # 过程卡:调用返回执行指引,主循环亲自执行;声明的工具直挂宿主工具面
  # ("工具不出 ns"的唯一显式豁免)。要隔离执行就声明成 subagents: 条目。
  - name: price-check
    description: 商品比价核查(轻流程,主循环按指引直接执行)
    tools: ["tools/shop/search_products", "tools/shop/get_product"]
    prompt: |
      商品比价核查流程(严格按步骤):
      1. 用 search_products 按关键词找到目标商品,拿到 SKU 与售价;
      2. 用 get_product 查该 SKU 的成本;
      3. 输出:售价、成本、毛利率(=(售价-成本)/售价×100%),一句话结论。
      用户诉求:{$input}

  # 卡 → sub-agent 组合:轻步骤主循环自己做,深分析交给隔离的分析师
  - name: price-review
    description: 审查指定商品的定价(拉详情与库存,深入判断交给分析师)
    params:
      sku:      {type: string, desc: 商品 SKU, required: true}
      question: {type: string, desc: 用户关注点}
    tools: ["tools/shop/get_product", "tools/shop/get_inventory"]
    prompt: |
      审查 {sku} 的定价(关注:{question}):
      1. 用 get_product 查详情(售价/成本),用 get_inventory 看库存水位;
      2. 若只需常规结论,直接综合作答;
      3. 若需要深入定价分析(竞争力/弹性/清库存策略),把 SKU、关注点
         和已查到的关键数字交给 price_analyst 执行,引用其结论作答。

  - name: quick-product-qa
    description: 快速商品问答
    tools: ["tools/shop/search_products"]
    prompt: "回答用户的商品问题:需要商品数据时用 search_products 查询后作答。问题:{$input}"

  - name: check-inventory
    description: 查询商品库存明细(只读):各仓可用/预留数量与近30天出入库流水
    params:
      sku: {type: string, desc: 商品 SKU, required: true}
    tools: ["tools/shop/get_inventory"]
    prompt: "用 get_inventory 查询 {sku} 的库存明细,汇总各仓可用/预留与近期流水要点。"

  - name: apply-price
    description: 应用新的商品价格(改动性操作,update_price 受审批策略约束)
    params:
      sku:   {type: string, desc: 商品 SKU, required: true}
      price: {type: string, desc: 新价格, required: true}
    tools: ["tools/shop/update_price"]
    prompt: "用 update_price 把 {sku} 的价格调整为 {price},完成后汇报结果。"

  - name: set-product-status
    description: 商品上下架(改动性操作,受审批策略约束)
    params:
      sku:    {type: string, desc: 商品 SKU, required: true}
      status: {type: string, desc: "目标状态(在售|下架|预售)", required: true}
    tools: ["tools/shop/set_product_status"]
    prompt: "用 set_product_status 把 {sku} 状态调整为 {status},完成后汇报结果。"

  - name: restock
    description: 给指定仓库补货(改动性操作):先核当前库存,再执行调整
    params:
      sku:       {type: string, desc: 商品 SKU, required: true}
      warehouse: {type: string, desc: 仓库, required: true}
      qty:       {type: string, desc: 补货数量, required: true}
    tools: ["tools/shop/get_inventory", "tools/shop/adjust_stock"]
    prompt: |
      给 {sku} 在 {warehouse} 补货 {qty} 件(严格按步骤):
      1. 用 get_inventory 查当前库存,记下 {warehouse} 的补货前数量;
      2. 用 adjust_stock 执行调整(delta={qty});
      3. 一句话汇报补货前后变化。

  - name: bulk-audit
    description: 批量盘点某品类的商品与库存
    params:
      category: {type: string, desc: 品类, required: true}
    tools: ["tools/shop/search_products", "tools/shop/get_inventory"]
    prompt: |
      对品类「{category}」做一次批量盘点:
      1. 用 search_products 按品类检索全部商品;
      2. 对每个 SKU 用 get_inventory 核对库存;
      3. 汇总:商品数、异常项(缺货/积压)、一句话结论。

  - name: audit-product
    description: 审计单个商品的数据合规性
    params:
      id: {type: string, desc: 商品 ID, required: true}
    tools: ["tools/shop/get_product"]
    prompt: "用 get_product 查 {id} 的数据,审计价格/成本/状态字段是否合规,给出一句结论。"

subagents:
  # sub-agent:隔离子循环——digest 大结果消化 + 内部压缩,fork 的接收方。
  # 中间数据大、不想污染主对话时用它;事实要显式写进参数。
  - name: price_analyst
    description: 深度定价分析(竞争力/弹性/清库存策略;隔离执行,继承对话背景)
    context: fork
    loop: {max_rounds: 6, compaction: {max_messages: 20, keep_recent: 8}}
    digest: {over: 3000}
    params: {sku: {type: string, required: true}, question: {type: string}}
    prompt: "你是价格分析师。分析商品 {sku} 的定价(用户关注:{question})。先调用 get_product 查询商品详情,必要时调用 get_inventory 看库存,然后给出定价结论。"
    tools:
      - "tools/shop/get_product"
      - "tools/shop/get_inventory"
