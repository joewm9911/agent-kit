# examples/interactive —— 冒烟场景的**可交互副本**(smoke 树保持纯测试用途,
# 两树独立演进):真实 MiniMax + 内置 mock 业务后端 + 真实 pdf 技能
# (anthropics/skills),入口 go run ./examples/interactive。
#
# 环境占位(runner 会注入默认,亦可外部覆盖):
#   MINIMAX_API_KEY   必填(keychain 取)
#   OPS_MODEL_BASE    模型 base_url(默认国内 api.minimaxi.com)
#   OPS_API_BASE      业务后端(默认 runner 内置 mock)
#   OPS_DATA_DIR      工作目录(默认 ./data/interactive;技能装其下 agent-kit/.skills)
#   PDF_SKILL_REF     pdf 技能来源(默认真实 anthropics/skills,pin sha)
#   OPS_SANDBOX       脚本执行沙箱(runner 检测:有 docker → "docker",否则 "" 宿主直跑)
#   OPS_SANDBOX_IMAGE 沙箱镜像(默认 python:3.12-slim;pdf 技能进沙箱需带 pypdf 的镜像,
#                     见 examples/exec-runtime/Dockerfile)
#   OPS_SESSION       会话 ID(默认 cli-<pid>,每次启动新会话;传上次的 ID 续聊)
#   OPS_MODEL_PROVIDER 模型厂商(默认 zhipu;可选 minimax / openai)
#   OPS_MODEL_KEY      模型 API key(默认取 ZHIPU_API_KEY / MINIMAX_API_KEY)
#   OPS_MODEL_NAME     模型名(空 = 各厂商默认:glm-5.2 / MiniMax-Text-01)
#   OPS_SESSION_STORE / OPS_TODO_STORE  会话/计划存储(runner 检测:redis 可达
#                     → redis,否则 file);OPS_REDIS_ADDR 默认 127.0.0.1:6379

secrets:
  provider: env

# 执行画像基线(app 层):model + reliability 全体执行单元的降级源。
# 校准依据:技能是内含多次模型调用的子循环,深推理模型(glm-5.2)单次
# 生成就可能 >60s,tool_timeout 太紧会把整类技能掐死;429 限流是分钟级
# 窗口,退避从秒级起跳才有意义。
reliability:
  retry: {max_attempts: 3, base_delay: 3s, max_delay: 30s}
  tool_timeout: 300s

# 外部技能包:安装到 <work_dir>/agent-kit/.skills;pdf 技能带脚本
# (Risk=Dangerous),准入需显式提升。
work_dir: "${OPS_DATA_DIR}"
catalog:
  max_risk: dangerous
skillpacks:
  sync: auto

# 脚本执行沙箱(app 级策略):default_sandbox 覆盖**所有** exec 能力——
# 计算域的 python 工具、pdf 技能包自动生成的脚本工具,不逐个显式配就统一
# 进这里指定的沙箱。docker 沙箱由 runner 空导入 impl/exec/docker 注册,
# 每次执行 = 一次性加固容器(--rm、无网络、只读根、cap-drop=ALL、限内存)。
# 生产写死并加 require_sandbox: true(无沙箱可用的 exec 工具装配即 fail
# fast,脚本裸跑架构上不可能):
#   exec:
#     default_sandbox: docker
#     sandbox_config: {image: "agent-kit-runtime:latest", network: none, memory: 512m}
#     require_sandbox: true
exec:
  default_sandbox: "${OPS_SANDBOX}"
  sandbox_config:
    image: "${OPS_SANDBOX_IMAGE}"
    network: none
    memory: 256m

# 计算域(全局兼容源):python 脚本执行工具,agent 用 capabilities.include
# 选品直挂工具面(见 agents/ops-manager.yaml)。沙箱不在这里配——上面的
# exec: 块装配期注入;工具级可显式覆盖(优先于 app 默认),形如:
#   - {name: python, runtime: python, sandbox: docker,
#      sandbox_config: {image: "python:3.12-slim", network: none}}
# 或用 command 自己包一层隔离(与 sandbox 互斥):
#   - {name: python, runtime: python, command: ["firejail","--quiet","python3","-c"]}
sources:
  - name: calc
    type: exec
    required: true
    config:
      timeout: 60s
      tools:
        - name: python
          runtime: python
          description: 执行一段 python3 脚本做计算/数据处理,返回 stdout。script=脚本内容(用 print 输出结果),args=空格分隔参数(可空)。

# 模型可切换(runner 按 OPS_MODEL_PROVIDER 注入默认;默认 zhipu/glm-5.2):
#   OPS_MODEL_PROVIDER=minimax MINIMAX_API_KEY=... 切回 MiniMax
model:
  provider: "${OPS_MODEL_PROVIDER}"
  config:
    api_key: "${OPS_MODEL_KEY}"
    base_url: "${OPS_MODEL_BASE}"
    model: "${OPS_MODEL_NAME}"

agents:
  - agents/ops-manager.yaml
  - agents/support-bot.yaml

observability:
  log: false
