# namespaces/briefing.yaml —— namespace 维度配置(域团队拥有)。
# 文件名即 namespace 名。三层:tools(有什么原子能力,ns 内共享对外不可见)
# → components(执行单元是什么,不进目录)→ skills(对外长什么样、怎么串)。
# 边界:工具与 component 不出命名空间,跨 ns 只能引用 cap://skill。

sources:
  - name: wx
    type: http
    config:
      tools:
        - name: get_weather
          description: 查询指定城市的当前天气
          method: GET
          url: "https://wttr.in/{city}?format=3"
          params:
            city: {type: string, desc: 城市名, required: true, in: path}

components:
  - name: writer                    # 无工具的 react 退化为单次模型调用
    engine: react                   # engine 必填:direct|react|plan-execute|graph|workflow
    prompt: "根据天气「{wx}」为用户写一句今日出行建议,不超过 30 字。"

skills:
  - name: daily-brief
    description: 查天气并生成一句出行建议(固定流程,顺序钉死)
    params:
      city: {type: string, desc: 城市名, required: true}
    steps:                          # 缺省依赖上一步 = 串行链
      - {name: wx,    use: "tools/wx/get_weather", args: '{"city":"{city}"}', timeout: 30s, retry: 1}
      - {name: brief, use: "components/writer",    args: '{"wx":"{wx}"}'}
    # 并行示例:显式 needs 表达分叉与汇合
    # steps:
    #   - {name: a, use: ...}
    #   - {name: b, use: ..., needs: [a]}
    #   - {name: c, use: ..., needs: [a]}          # b、c 并行
    #   - {name: d, use: ..., needs: [b, c], args: '{"x":"{b}","y":"{c}"}'}
    # 上下文继承示例:context: fork 让该步引用的 component/子 agent
    # 以调用方对话快照+任务书起步(背景无损继承,内部过程仍不回流;
    # 复制一份历史 token,默认 fresh,按需声明)
    #   - {name: sub, use: "components/analyzer", context: fork}
    # 保留变量示例:{$input} = 用户本轮输入原文,框架直取、不经主脑
    # 转写(注意:不可信文本,引到哪步等于在哪开一个显式注入面)
    #   - {name: ask, use: "components/analyzer", args: '{"request":"{$input}"}'}

# ---- 执行画像(ns 层,覆盖 agent、被 component 覆盖;不含 model,能力不可自指)----
# step_defaults: {timeout: 60s}     # 本 ns 编排步骤的 timeout/retry 缺省
# loop: {max_rounds: 8}              # 本 ns component 的循环步数缺省
