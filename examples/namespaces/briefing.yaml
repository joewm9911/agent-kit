# namespaces/briefing.yaml —— namespace 维度配置(域团队拥有)。
# 文件名即 namespace 名。结构:sources(有什么原子能力,ns 内共享对外
# 不可见)→ skills(过程卡:主循环照指引执行,工具直挂)→ subagents
# (同构隔离子循环)。挂载即对 agent 可见。
# 边界:工具不出命名空间(过程卡直挂是唯一显式豁免)。

sources:
  - name: wx
    type: http
    config:
      tools:
        - name: get_weather
          description: 查询指定城市的当前天气
          method: GET
          url: "https://wttr.in/{city}?format=3"
          params:
            city: {type: string, desc: 城市名, required: true, in: path}

skills:
  - name: daily-brief               # 过程卡:主循环照指引亲自执行
    description: 查天气并生成一句出行建议
    params:
      city: {type: string, desc: 城市名, required: true}
    tools: ["tools/wx/get_weather"] # 声明的工具直挂宿主工具面
    prompt: |
      为 {city} 生成今日出行简报:
      1. 用 get_weather 查询 {city} 当前天气;
      2. 根据天气写一句出行建议,不超过 30 字;
      3. 输出:天气原文 + 建议。

