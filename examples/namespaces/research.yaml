# namespaces/research.yaml —— 重型任务声明为 sub-agent(同构隔离子循环):
# 长任务的中间数据不污染主对话,终答可经 deliver 走交付物直达。

sources:
  - name: weather
    type: http
    config:
      tools:
        - name: get_weather
          description: 查询指定城市的当前天气,返回一行摘要
          method: GET
          url: "https://wttr.in/{city}?format=3"
          params:
            city: {type: string, desc: 城市名(拼音或英文), required: true, in: path}

subagents:
  - name: competitor_report
    version: "1"
    description: >
      对指定竞品生成结构化分析报告。任务耗时较长,仅在用户明确需要
      完整竞品报告时调用;只是随口问竞品的某个点,不要调用。
    params:
      company: {type: string, desc: 竞品公司名, required: true}
      focus:   {type: string, desc: "额外关注的方面,可选"}
    prompt: "cap://prompt/pp/competitor-brief"
    tools:
      - "tools/weather/get_weather"
    todo: true                      # 长任务:内部挂调用级清单
    loop: {max_rounds: 12}
